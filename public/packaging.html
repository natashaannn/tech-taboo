<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Techie Taboo Packaging Lid Renderer</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1080px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(8, 20, 24, 0.08);
      margin-bottom: 14px;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
      align-items: end;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }
    select, input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      font-family: Arial, sans-serif;
    }
    textarea {
      min-height: 94px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      font-weight: 600;
      background: #f8fafc;
    }
    .muted {
      color: #475569;
      font-size: 13px;
    }
    #packagingOutput {
      width: 100%;
      overflow: auto;
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid #e5e7eb;
    }
    #packagingOutput svg {
      width: min(980px, 100%);
      height: auto;
      display: block;
      margin: 0 auto;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Packaging Lid Renderer</h1>
    <p class="muted">
      Rigid box full-lid layout with 5 sides:
      lid top 66x95mm, long side 95x29.4mm x2, short side 66x29.4mm x2.
    </p>

    <div class="card">
      <div class="controls">
        <div>
          <label for="categorySelect">Category</label>
          <select id="categorySelect"></select>
        </div>
        <div>
          <label for="versionInput">Version</label>
          <input id="versionInput" type="text" value="v1.0" />
        </div>
        <div style="grid-column: 1 / -1;">
          <label for="descriptionInput">Description</label>
          <textarea id="descriptionInput"></textarea>
        </div>
        <div>
          <button id="resetDescription" type="button">Reset Category Description</button>
        </div>
        <div>
          <button id="exportPngNoBorders" type="button">Export PNG (No Borders)</button>
        </div>
        <div>
          <button id="exportPanelsZip" type="button">Export Panels PNG ZIP</button>
        </div>
      </div>
    </div>

    <div id="packagingOutput" class="card"></div>

    <div class="card">
      <a href="./index.html">Back to Card Generator</a>
    </div>
  </div>
  <script type="module" src="./scripts/packaging.js"></script>
</body>
</html>
